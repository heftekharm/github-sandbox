name: Download from Commit & Save to Repo

on:
  push:
    branches:
      - '**'

jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2
        run: sudo apt-get install -y aria2

      - name: Extract URLs and download files
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          
          if echo "$COMMIT_MSG" | grep -q "download-zip:"; then
            MODE="zip"
            URLS=$(echo "$COMMIT_MSG" | sed -n 's/.*download-zip:\s*\(.*\)/\1/p')
          elif echo "$COMMIT_MSG" | grep -q "download:"; then
            MODE="normal"
            URLS=$(echo "$COMMIT_MSG" | sed -n 's/.*download:\s*\(.*\)/\1/p')
          else
            echo "Error: No 'download:' or 'download-zip:' keyword found in commit message."
            exit 1
          fi
          
          echo "Mode: $MODE"
          echo "URLs: $URLS"
          
          mkdir -p downloads tmp_downloads
          
          # Download yt-dlp
          wget -q https://github.com/yt-dlp/yt-dlp/releases/download/2026.03.17/yt-dlp_linux -O /tmp/yt-dlp
          chmod +x /tmp/yt-dlp
          
          for URL in $URLS; do
            echo "Processing URL: $URL"
            
            # Check if URL is a YouTube link
            if echo "$URL" | grep -qE "(youtube\.com|youtu\.be)"; then
              echo "Detected YouTube URL, using yt-dlp..."
              /tmp/yt-dlp -o "tmp_downloads/%(title)s.%(ext)s" "$URL"
            else
              FILENAME=$(basename "$URL")
              echo "Downloading $FILENAME using aria2..."
              aria2c --split=2 --max-connection-per-server=2 --min-split-size=90M \
                -d tmp_downloads -o "$FILENAME" "$URL"
            fi
          done
          
          # Zip mode: create archive
          if [ "$MODE" = "zip" ]; then
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            cd tmp_downloads
            zip -r "archive_${TIMESTAMP}.zip" *
            cd ..
          fi
          
          # Split large files
          LIMIT=$((90 * 1024 * 1024))
          for FILE in tmp_downloads/*; do
            if [ -f "$FILE" ]; then
              FILESIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")
              
              if [ "$FILESIZE" -gt "$LIMIT" ]; then
                echo "Splitting $BASENAME (size: $FILESIZE bytes)"
                zip -s 90m -j "downloads/${BASENAME}.zip" "$FILE"
                PARTS=$(ls downloads/${BASENAME}.z* 2>/dev/null | wc -l)
                echo "Created $((PARTS + 1)) parts"
              else
                echo "Copying $BASENAME (size: $FILESIZE bytes)"
                cp "$FILE" downloads/
              fi
            fi
          done
          
          rm -rf tmp_downloads

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Add downloaded files from commit [skip ci]"
            git push origin ${{ github.ref_name }}
          fi
